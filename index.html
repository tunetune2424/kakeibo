<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>残高管理アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Firebaseの設定（あなたのプロジェクト専用）
        const firebaseConfig = {
            apiKey: "AIzaSyBNwBLLxi-LLqdlqSND69rPzuThhj8cijc",
            authDomain: "my-kakeibo-app-1db52.firebaseapp.com",
            projectId: "my-kakeibo-app-1db52",
            storageBucket: "my-kakeibo-app-1db52.firebasestorage.app",
            messagingSenderId: "686700068143",
            appId: "1:686700068143:web:ab642169bf42364e8f35da",
            measurementId: "G-XYV1JC3RY6"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className = "" }) => (
            <i className={`lucide-${name} ${className}`} style={{ fontSize: size, width: size, height: size }}></i>
        );

        const App = () => {
            const getCurrentMonth = () => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            };

            const [currentMonth, setCurrentMonth] = useState(getCurrentMonth());
            const [budget, setBudget] = useState(0);
            const [expenses, setExpenses] = useState([]);
            const [itemName, setItemName] = useState('');
            const [itemAmount, setItemAmount] = useState('');
            const [isSettingBudget, setIsSettingBudget] = useState(false);
            const [tempBudget, setTempBudget] = useState('');

            // クラウドからデータをリアルタイムに読み込む
            useEffect(() => {
                const unsubscribe = db.collection("months").doc(currentMonth)
                    .onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            setBudget(data.budget || 0);
                            setExpenses(data.expenses || []);
                        } else {
                            // データがない場合は初期化
                            setBudget(0);
                            setExpenses([]);
                        }
                    }, (error) => {
                        console.error("Firestore Error:", error);
                    });
                return () => unsubscribe();
            }, [currentMonth]);

            // 保存処理
            const updateFirebase = async (newBudget, newExpenses) => {
                try {
                    await db.collection("months").doc(currentMonth).set({
                        budget: newBudget,
                        expenses: newExpenses
                    });
                } catch (e) {
                    alert("保存に失敗しました。Firestoreのルールを確認してください。");
                }
            };

            const addExpense = (e) => {
                e.preventDefault();
                if (!itemName || !itemAmount || Number(itemAmount) <= 0) return;
                const newExpenses = [{
                    id: Date.now(),
                    name: itemName,
                    amount: Number(itemAmount),
                    date: new Date().toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
                }, ...expenses];
                updateFirebase(budget, newExpenses);
                setItemName(''); setItemAmount('');
            };

            const deleteExpense = (id) => {
                const newExpenses = expenses.filter(item => item.id !== id);
                updateFirebase(budget, newExpenses);
            };

            const changeMonth = (offset) => {
                const [year, month] = currentMonth.split('-').map(Number);
                const date = new Date(year, month - 1 + offset, 1);
                setCurrentMonth(`${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`);
                setIsSettingBudget(false);
            };

            const totalSpent = expenses.reduce((sum, item) => sum + item.amount, 0);
            const balance = budget - totalSpent;
            const spentPercentage = budget > 0 ? Math.min((totalSpent / budget) * 100, 100) : 0;

            return (
                <div className="max-w-md mx-auto bg-slate-50 min-h-screen pb-24 shadow-2xl flex flex-col relative">
                    <div className="bg-indigo-700 text-white px-6 py-4 flex justify-between items-center shadow-md">
                        <button onClick={() => changeMonth(-1)} className="p-2 active:bg-indigo-600 rounded-full"><Icon name="chevron-left" /></button>
                        <div className="flex items-center gap-2 font-bold text-lg"><Icon name="calendar" size={18} /> {currentMonth.replace('-', '年')}月</div>
                        <button onClick={() => changeMonth(1)} className="p-2 active:bg-indigo-600 rounded-full"><Icon name="chevron-right" /></button>
                    </div>

                    <div className="bg-gradient-to-br from-indigo-600 to-blue-500 text-white p-8 rounded-b-[2.5rem] shadow-xl">
                        <p className="text-blue-100 text-sm opacity-80 mb-1">現在の残高</p>
                        <h1 className="text-5xl font-black mb-6">¥{balance.toLocaleString()}</h1>
                        <div className="w-full bg-blue-900/30 h-2.5 rounded-full mb-6 overflow-hidden">
                            <div className={`h-full transition-all duration-700 ${spentPercentage > 90 ? 'bg-red-400' : 'bg-emerald-400'}`} style={{ width: `${Math.max(0, 100 - spentPercentage)}%` }}></div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-white/10 p-3 rounded-2xl border border-white/10">
                                <p className="text-[10px] uppercase opacity-60 font-bold">予算</p>
                                <p className="text-lg font-bold">¥{budget.toLocaleString()}</p>
                            </div>
                            <div className="bg-white/10 p-3 rounded-2xl border border-white/10">
                                <p className="text-[10px] uppercase opacity-60 font-bold">支出</p>
                                <p className="text-lg font-bold text-red-100">¥{totalSpent.toLocaleString()}</p>
                            </div>
                        </div>
                    </div>

                    <div className="px-6 -mt-5 flex-grow">
                        {!isSettingBudget ? (
                            <button onClick={() => {setTempBudget(budget); setIsSettingBudget(true)}} className="w-full mb-6 bg-white border border-slate-200 p-4 rounded-2xl text-slate-600 font-bold shadow-sm flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                <Icon name="wallet" size={18} className="text-indigo-500" /> 予算を更新
                            </button>
                        ) : (
                            <div className="mb-6 bg-white p-5 rounded-3xl shadow-xl border-2 border-indigo-100">
                                <label className="text-xs font-black text-slate-400 mb-2 block tracking-widest">今月の予算額</label>
                                <input type="number" className="w-full p-2 text-3xl font-black border-b-2 border-indigo-500 outline-none mb-4 bg-transparent" value={tempBudget} onChange={(e) => setTempBudget(e.target.value)} autoFocus />
                                <div className="flex gap-3">
                                    <button onClick={() => {updateFirebase(Number(tempBudget), expenses); setIsSettingBudget(false)}} className="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">保存</button>
                                    <button onClick={() => setIsSettingBudget(false)} className="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold">戻る</button>
                                </div>
                            </div>
                        )}

                        <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 mb-8">
                            <form onSubmit={addExpense} className="space-y-4">
                                <input type="text" placeholder="項目名" className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 text-sm font-bold" value={itemName} onChange={(e) => setItemName(e.target.value)} />
                                <input type="number" placeholder="金額" className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 text-sm font-bold" value={itemAmount} onChange={(e) => setItemAmount(e.target.value)} />
                                <button className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">支出を追加</button>
                            </form>
                        </div>

                        <div className="space-y-3 pb-10">
                            <h2 className="text-[10px] font-black text-slate-400 px-1 uppercase tracking-widest">履歴 ({expenses.length})</h2>
                            {expenses.map(item => (
                                <div key={item.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-indigo-50 text-indigo-500 rounded-xl flex items-center justify-center"><Icon name="receipt" /></div>
                                        <div><p className="font-bold text-slate-800 text-sm">{item.name}</p><p className="text-[10px] text-slate-400">{item.date}</p></div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <p className="font-black text-slate-800">¥{item.amount.toLocaleString()}</p>
                                        <button onClick={() => deleteExpense(item.id)} className="text-slate-200 hover:text-red-400"><Icon name="trash-2" size={16} /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-md border-t border-slate-100 p-4 flex justify-around items-center z-30">
                        <div className="text-indigo-600 flex flex-col items-center gap-1"><Icon name="wallet" /><span className="text-[10px] font-bold">ホーム</span></div>
                        <div className="text-slate-300 flex flex-col items-center gap-1"><Icon name="calendar" /><span className="text-[10px] font-bold">履歴</span></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
